    <title>DSA Mind Map</title>
    <link
        href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <div id="topbar">
        <div class="title-with-icon">
            <svg class="icon-box" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1a1d23" stroke-width="1.5" stroke-linecap="round">
                <rect x="3" y="3" width="8" height="8" fill="#2d3142" stroke="#1a1d23"/>
                <rect x="13" y="3" width="8" height="8" fill="#2d3142" stroke="#1a1d23"/>
                <rect x="3" y="13" width="8" height="8" fill="#2d3142" stroke="#1a1d23"/>
                <rect x="13" y="13" width="8" height="8" fill="#2d3142" stroke="#1a1d23"/>
            </svg>
            <strong>DSA Mind Map</strong>
        </div>
        <span>Pakistan Edition 🇵🇰</span>
        <div class="tb-sep"></div>
        <div class="tb-search">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#8a8f9c" stroke-width="2.5"
                stroke-linecap="round">
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input type="text" id="searchinput" placeholder="Search algorithm…" autocomplete="off" />
        </div>
        <div id="search-results"></div>
    </div>
    <div id="statsbar">
        <div class="stat">
            <div class="stat-dot" style="background:#e74c3c"></div> MUST KNOW: <b id="s-must">0</b>
        </div>
        <div class="stat">
            <div class="stat-dot" style="background:#27ae60"></div> HIGH: <b id="s-high">0</b>
        </div>
        <div class="stat">
            <div class="stat-dot" style="background:#2980b9"></div> GOOD: <b id="s-good">0</b>
        </div>
        <div class="stat">Topics: <b id="s-topics">0</b></div>
        <div class="stat">Algorithms: <b id="s-algos">0</b></div>
    </div>

    <div id="viewport">
        <div id="world"><svg id="lines"></svg></div>
    </div>

    <div id="panel">
        <div class="ph">
            <button class="ph-close" id="ph-close">✕</button>
            <div class="ph-bc" id="ph-bc"></div>
            <div class="ph-title" id="ph-title"></div>
            <div class="ph-badges" id="ph-badges"></div>
        </div>
        <div class="pb" id="pb"></div>
    </div>

    <div id="leg">
        <div class="lt">Priority</div>
        <div class="lr"><span class="rec-must"> MUST</span> Every interview</div>
        <div class="lr"><span class="rec-high"> HIGH</span> Very common</div>
        <div class="lr"><span class="rec-good">✓ GOOD</span> Nice to have</div>
    </div>

    <div id="ctrls">
        <button id="bi">＋</button>
        <button id="bo">－</button>
        <button id="bf">⊡</button>
        <div class="csep"></div>
        <div id="chint">scroll · drag · click topic</div>
    </div>
<script src="script.js"></script>
</body>
</html>>
